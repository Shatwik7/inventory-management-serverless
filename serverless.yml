# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: shatwik
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: shop
# "service" is the name of this project. This will also be added to your AWS resource names.
service: shop

provider:
  name: aws
  runtime: nodejs20.x
  environment:
    INVENTORY_TABLE: ${self:service}-${sls:stage}-inventory
    CUSTOMER_TABLE: ${self:service}-${sls:stage}-customers
    CONFIG_TABLE: ${self:service}-${sls:stage}-config
    AUTH_JWT_SECRET: ${env:AUTH_JWT_SECRET, 'local-dev-change-me'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt:
                - InventoryTable
                - Arn
            - Fn::GetAtt:
                - ConfigTable
                - Arn
            - Fn::GetAtt:
              - CustomerTable
              - Arn
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: any
      - httpApi:
          path: /
          method: any

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    target: node20
    platform: node

resources:
  Resources:
    InventoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.INVENTORY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: itemId
            AttributeType: S
        KeySchema:
          - AttributeName: itemId
            KeyType: HASH
    ConfigTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONFIG_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: configKey
            AttributeType: S
        KeySchema:
          - AttributeName: configKey
            KeyType: HASH
    CustomerTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CUSTOMER_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: customerId
            AttributeType: S
        KeySchema:
          - AttributeName: customerId
            KeyType: HASH
